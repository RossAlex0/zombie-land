services:
  zombieland-db-test:
    image: postgres:17
    environment:
      POSTGRES_USER: admin_zombieland
      POSTGRES_PASSWORD: zombieland
      POSTGRES_DB: zombieland_test
    ports:
      - 5434:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin_zombieland -d zombieland_test']
      interval: 5s
      timeout: 5s
      retries: 5
    # Pas de volume : base éphémère, état propre à chaque démarrage du container
